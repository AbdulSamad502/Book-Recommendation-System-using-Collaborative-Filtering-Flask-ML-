<!DOCTYPE html>
<html>
<head>
    <title>Book Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>📚 Top 50 Books</h1>

<a href="/recommend">Go to Recommendation Page</a>

<div class="container">
    {% for i in range(book_name|length) %}
    <div class="card">
        <img src="{{ image[i] }}">
        <h3>{{ book_name[i] }}</h3>
        <p>{{ author[i] }}</p>
        <p>⭐ {{ rating[i] }}</p>
    </div>
    {% endfor %}
</div>

</body>
</html>
